    Cache-Control = "no-store, no-cache, must-revalidate"

# ── Force HTTPS ───────────────────────────────────────────────────────────────
[[redirects]]
  from   = "http://1st-bond.com/*"
  to     = "https://1st-bond.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.1st-bond.com/*"
  to     = "https://1st-bond.com/:splat"
  status = 301
  force  = true

# ── JS assets: no-cache so fixes deploy immediately ──────────────────────────
[[headers]]
  for = "/js/*.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Pretty URL rewrites ───────────────────────────────────────────────────────
