[build]
  command   = "node build.js"
  publish   = "."
  functions = "netlify/functions"

# ── Security headers (all pages) ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://apwxlfbbngfvvafrnafy.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

# ── Auth & account pages: relaxed CSP to allow Supabase ───────────────────────
[[headers]]
  for = "/login.html"
  [headers.values]
    Cache-Control           = "no-store, no-cache, must-revalidate"
    X-Robots-Tag            = "noindex, noarchive"
    Content-Security-Policy = "default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://apwxlfbbngfvvafrnafy.supabase.co blob:; connect-src 'self' https://apwxlfbbngfvvafrnafy.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

