<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Email Confirmed — 1STBOND</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --p: #a020f0;
      --bg: #060608;
      --surface: #0f0f12;
      --border: rgba(255,255,255,.07);
      --text: #f0f0f5;
      --text2: rgba(240,240,245,.65);
      --text3: rgba(240,240,245,.38);
      --success: #22c55e;
      --success-dim: rgba(34,197,94,.1);
      --success-border: rgba(34,197,94,.25);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 32px; text-decoration: none;
    }
    .logo img { width: 32px; height: 32px; border-radius: 8px; }
    .logo span { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: 0.4px; }
    .card {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 24px; padding: 40px 36px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--success-dim); border: 1px solid var(--success-border);
      display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
    }
    .icon-wrap svg { width: 34px; height: 34px; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.4px; margin-bottom: 12px; }
    p { font-size: 15px; color: var(--text2); line-height: 1.6; margin-bottom: 32px; }
    .open-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 16px 24px; background: var(--p); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700;
      border: none; border-radius: 14px; cursor: pointer; text-decoration: none;
      transition: opacity .2s; margin-bottom: 16px;
    }
    .open-btn:hover { opacity: 0.88; }
    .note { font-size: 12px; color: var(--text3); line-height: 1.5; }
    @media (max-width: 480px) { .card { padding: 32px 24px; } }
  </style>
</head>
<body>

  <a class="logo" href="/">
    <img src="./logo.png" alt="1STBOND" />
    <span>1STBOND</span>
  </a>

  <div class="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5"/>
      </svg>
    </div>

    <h1>Email Confirmed!</h1>
    <p>
      Your email address has been verified. Open the 1STBOND app to complete your ID verification and start using the platform.
    </p>

    <a class="open-btn" href="firstbond://email-confirmed">
      Open 1STBOND App
    </a>

    <p class="note">
      If the button doesn't open the app automatically, make sure 1STBOND is installed, then open it and sign in.
    </p>
  </div>

  <script>
    // Auto-attempt deep link after a short delay so the page renders first
    setTimeout(function () {
      window.location.href = 'firstbond://email-confirmed'
    }, 800)
  </script>

</body>
</html>
